{% extends 'base.html' %}

{% block conteudo %}

<div class="popup-overlay">
    <div class="popup-box">
        <h2>⚠️ Acesso Negado</h2>
        <p>{{ mensagem }}</p>

        <button onclick="window.location.href='/home'">
            Voltar
        </button>
    </div>
</div>

<style>
.popup-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 999;
}

.popup-box {
    background: white;
    padding: 30px 40px;
    border-radius: 15px;
    text-align: center;
    width: 350px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
}

.popup-box h2 {
    color: #e53935;
    margin-bottom: 10px;
}

.popup-box p {
    color: #555;
    margin-bottom: 20px;
}

.popup-box button {
    background: linear-gradient(45deg, #4facfe, #3f94df);
    border: none;
    color: white;
    padding: 12px 25px;
    border-radius: 10px;
    cursor: pointer;
}
</style>

{% endblock %}
