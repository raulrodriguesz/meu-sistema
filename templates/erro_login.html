<!DOCTYPE html>
<html>
<head>
    <title>Erro</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(45deg, #4facfe, #3f94df);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .popup-box {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            text-align: center;
            width: 350px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.2);
            animation: aparecer 0.3s ease;
        }

        @keyframes aparecer {
            from {
                transform: scale(0.8);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup-box h2 {
            color: #e53935;
            margin-bottom: 10px;
        }

        .popup-box p {
            color: #555;
            margin-bottom: 20px;
        }

        .popup-box button {
            background: linear-gradient(45deg, #4facfe, #3f94df);
            border: none;
            color: white;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="popup-box">
    <h2>⚠️ Erro</h2>
    <p>{{ mensagem }}</p>

    <button onclick="window.location.href='/'">
        Voltar para login
    </button>
</div>

</body>
</html>
