<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: linear-gradient(120deg, #4facfe, #3b8ae4);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            width: 350px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }

        .logo {
            width: 120px;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            box-sizing: border-box;
            transition: 0.2s;
        }

        input:focus {
            border-color: #4facfe;
            outline: none;
            box-shadow: 0 0 5px rgba(79,172,254,0.4);
        }

        .password-box {
            position: relative;
        }

        .password-box input {
            padding-right: 40px;
        }

        .toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
        }

        /* 🔥 BOTÃO ANIMADO */
        button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(45deg, #525252, #525252);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:active {
            transform: scale(0.97);
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="login-box">

    <img src="{{ url_for('static', filename='logo.png') }}" class="logo">

    <h2>Portal Gerencial Pianna Veículos</h2>

    <form method="POST">
        <input type="text" name="usuario" placeholder="Usuário" required>

        <div class="password-box">
            <input type="password" id="senha" name="senha" placeholder="Senha" required>
            <span class="toggle" onclick="toggleSenha()">👁</span>
        </div>

        <button type="submit">Entrar</button>
    </form>

    <div class="footer">
        Desenvolvido por Raul Rodrigues -
        ceoraul@gmail.com
    </div>
</div>

<script>
function toggleSenha() {
    var senha = document.getElementById("senha");
    senha.type = senha.type === "password" ? "text" : "password";
}
</script>

</body>
</html>
